kind = "web"
previewPath = "/"
title = "Neuron - Rapper"
version = "1.0.0"
id = "artifacts/neuron"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24485

[services.development]
run = "pnpm --filter @workspace/neuron run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neuron", "run", "build" ]
publicDir = "artifacts/neuron/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24485"
BASE_PATH = "/"
